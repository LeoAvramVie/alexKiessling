<section class="gallery-page-section">
  <div class="gallery-header container">
    <h1 class="page-title reveal-on-scroll">
      <span class="lang-de">Galerie</span>
      <span class="lang-en">Gallery</span>
    </h1>
    <p class="gallery-intro reveal-on-scroll">
      <span class="lang-de">Entdecken Sie Alex Kiesslings Gemälde, Zeichnungen und Skulpturen. Nutzen Sie die Filter, um zwischen den Werkzyklen zu wechseln.</span>
      <span class="lang-en">Explore Alex Kiessling\'s paintings, drawings, and sculptures. Use the filters to browse through different artwork series.</span>
    </p>
    
    <!-- Filter Tabs (compiled dynamically) -->
    <div class="filter-tabs-wrapper reveal-on-scroll">
      <div class="filter-tabs-container">
        {{TABS}}
      </div>
    </div>
  </div>

  <!-- Interactive Grid -->
  <div class="gallery-grid-viewport container">
    <div class="gallery-masonry-grid">
      <div class="gallery-hidden-source" style="display: none;">
        {{ARTWORKS_GRID}}
      </div>
      <div class="masonry-col masonry-col-1"></div>
      <div class="masonry-col masonry-col-2"></div>
      <div class="masonry-col masonry-col-3"></div>
    </div>
  </div>
</section>
