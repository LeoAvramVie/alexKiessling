<section class="vita-page-section">
  <div class="vita-header container">
    <h1 class="page-title reveal-on-scroll">Vita</h1>
    <p class="vita-intro reveal-on-scroll">
      <span class="lang-de">Ein Überblick über Ausstellungen, Performances und Meilensteine im Werdegang von Alex Kiessling.</span>
      <span class="lang-en">An overview of exhibitions, performances, and milestones in the career of Alex Kiessling.</span>
    </p>
  </div>

  <!-- Highlights Section (Horizontal Scroll Slider) -->
  <div class="slider-scroll-hint container reveal-on-scroll">
    <span class="lang-de">↔ Highlights wischen</span>
    <span class="lang-en">↔ Swipe for highlights</span>
  </div>
  <div class="vita-highlights-container reveal-on-scroll">
    <button class="slider-arrow arrow-left" aria-label="Vorheriges Highlight">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
    </button>
    
    <div class="vita-highlights-viewport">
      <div class="vita-slider-track">
        {{VITA_HIGHLIGHTS}}
      </div>
    </div>
    
    <button class="slider-arrow arrow-right" aria-label="Nächstes Highlight">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>

  <div class="white-cube-divider container"></div>

  <!-- Detailed chronological timeline list -->
  <div class="timeline-container container">
    <div class="detailed-timeline-list">
      {{VITA_ENTRIES}}
    </div>
  </div>
</section>
