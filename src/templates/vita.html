<section class="vita-page-section">
  <div class="vita-header container">
    <h1 class="page-title reveal-on-scroll">Vita</h1>
    <p class="vita-intro reveal-on-scroll">
      <span class="lang-de">Ein Überblick über Ausstellungen, Performances und Meilensteine im Werdegang von Alex Kiessling.</span>
      <span class="lang-en">An overview of exhibitions, performances, and milestones in the career of Alex Kiessling.</span>
    </p>
  </div>

  <!-- Highlights Section (Horizontal Scroll Slider) -->
  <div class="vita-highlights-viewport reveal-on-scroll">
    <div class="vita-slider-track">
      {{VITA_HIGHLIGHTS}}
    </div>
  </div>

  <div class="white-cube-divider container"></div>

  <!-- Detailed chronological timeline list -->
  <div class="timeline-container container">
    <h2 class="section-subtitle reveal-on-scroll" style="margin-bottom: var(--spacing-lg);">
      <span class="lang-de">Ausstellungsverzeichnis</span>
      <span class="lang-en">Exhibition Record</span>
    </h2>
    <div class="detailed-timeline-list">
      {{VITA_ENTRIES}}
    </div>
  </div>
</section>
